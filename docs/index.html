<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gymtracker</title>

<style>
:root {
  --red: #e30613;
  --red-dark: #9b0009;
  --bg: #070707;
  --panel: #111;
  --card: #181818;
  --text: #f5f5f5;
  --muted: #a7a7a7;
  --border: rgba(255,255,255,.08);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Inter, system-ui, sans-serif;
  background:
    radial-gradient(circle at top left, rgba(227,6,19,.25), transparent 40%),
    var(--bg);
  color: var(--text);
}

.hero {
  padding: 60px 30px;
  background: linear-gradient(135deg, var(--red), var(--red-dark));
}

.hero h1 {
  font-size: clamp(40px, 6vw, 80px);
  margin: 0;
  text-transform: uppercase;
}

.hero p {
  margin-top: 10px;
  color: rgba(255,255,255,.8);
}

.wrapper {
  max-width: 1100px;
  margin: -80px auto 60px;
  padding: 0 20px;
}

.shell {
  background: rgba(17,17,17,.9);
  backdrop-filter: blur(16px);
  border-radius: 24px;
  border: 1px solid var(--border);
  box-shadow: 0 30px 80px rgba(0,0,0,.5);
  overflow: visible;
}

.topbar {
  padding: 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
}

.badge {
  background: rgba(227,6,19,.2);
  border: 1px solid rgba(227,6,19,.6);
  padding: 6px 12px;
  border-radius: 999px;
  font-weight: bold;
}

.content {
  padding: 25px;
}

.section-title {
  margin: 25px 0 15px;
  font-size: 22px;
  border-left: 4px solid var(--red);
  padding-left: 10px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 15px;
}

.nav-card {
  padding: 20px;
  border-radius: 18px;
  background: linear-gradient(145deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
  border: 1px solid var(--border);
  transition: 0.2s;
}

.nav-card:hover {
  transform: translateY(-3px);
  border-color: var(--red);
}

.chart-card {
  padding: 20px;
  border-radius: 20px;
  margin-bottom: 25px;
  background: linear-gradient(145deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
  border: 1px solid var(--border);
  overflow-x: auto;
}

.chart-card h3 {
  margin-bottom: 15px;
}

.chart-card img {
  width: 100%;
  max-width: 100%;
  border-radius: 12px;
}

.btn {
  display: inline-block;
  padding: 10px 14px;
  border-radius: 999px;
  background: var(--red);
  font-weight: bold;
}

.btn.secondary {
  background: #222;
}

.footer {
  padding: 20px;
  border-top: 1px solid var(--border);
  text-align: center;
  color: var(--muted);
  font-size: 13px;
}
</style>
</head>

<body>

<header class="hero">
  <h1>Gymtracker</h1>
  <p>Studio-Auslastung automatisch gemessen und visualisiert.</p>
</header>

<main class="wrapper">
  <div class="shell">

    <div class="topbar">
      <div>Start</div>
      <div class="badge">● LIVE</div>
    </div>

    <div class="content">
      <div class='grid'><a class="nav-card" href="studios/ai-fitness-friedrichshafen/index.html"><strong>Friedrichshafen</strong></a></div>
    </div>

    <div class="footer">
      Gymtracker · AI Fitness Style
    </div>

  </div>
</main>

</body>
</html>
