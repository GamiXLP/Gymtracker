.btn {

}

.section-title {
  margin: 20px 0 10px;
  border-left: 4px solid var(--red);
  padding-left: 10px;
}

.chart-card {
  padding: 20px;
  margin-bottom: 25px;
  border-radius: 20px;
  background: var(--card);
  border: 1px solid var(--border);
  overflow-x: auto;
}

.chart-card img {
  max-width: 100%;
  border-radius: 12px;
}

.footer {
  text-align: center;
  padding: 20px;
  border-top: 1px solid var(--border);
